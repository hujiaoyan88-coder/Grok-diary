<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GROK DIARY</title>
  <style>
    :root { --grok-cyan: #00f5ff; }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      background: linear-gradient(180deg, #0a0a0a 0%, #1a0033 100%);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
    }
    header { text-align: center; padding: 25px 20px 15px; background: rgba(0,245,255,0.08); border-bottom: 1px solid var(--grok-cyan); }
    h1 { margin: 0; font-size: 28px; letter-spacing: 3px; }
    .container { padding: 15px 20px 30px; max-width: 420px; margin: 0 auto; }
    .card {
      background: rgba(26,26,26,0.95); border-radius: 20px; padding: 22px;
      margin-bottom: 22px; border: 1.5px solid var(--grok-cyan);
    }
    .emoji-picker { display: flex; justify-content: center; gap: 18px; flex-wrap: wrap; margin: 20px 0; }
    .emoji { font-size: 42px; padding: 8px; border-radius: 50%; cursor: pointer; transition: 0.25s; }
    .emoji.selected { background: var(--grok-cyan); color: black; transform: scale(1.25); }
    textarea { width: 100%; height: 220px; background: #111; border: 1px solid #444; border-radius: 16px; color: white; padding: 18px; font-size: 17px; resize: none; }
    button { width: 100%; padding: 16px; font-size: 18px; font-weight: bold; background: linear-gradient(90deg, #00f5ff, #ff00cc); color: black; border: none; border-radius: 9999px; }

    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .day {
      width: 100%;
      aspect-ratio: 3 / 4;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #1f1f1f;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      padding: 4px;
      position: relative;
      overflow: hidden;
    }
    .day.has-entry {
      background: rgba(0, 245, 255, 0.18);
      border: 2px solid var(--grok-cyan);
    }
    .day .emoji {
      font-size: 23px;
      align-self: center;
      line-height: 1;
      margin-bottom: 2px;
    }
    .day .date-num {
      font-size: 11px;
      opacity: 0.85;
      line-height: 0.5;
      align-self: flex-start;
      margin-left: 4px;
    }
  </style>
</head>
<body>
  <header><h1>GROK DIARY</h1><p>毒舌AIと書く日記</p></header>
  <div class="container">
    <div class="card">
      <h2 id="today-date"></h2>
      <div class="emoji-picker" id="emoji-picker"></div>
      <textarea id="diary-text" placeholder="今日あったこと、なんでも書いて..."></textarea>
      <button onclick="saveDiary()">保存する</button>
    </div>

    <div id="grok-comment" style="display:none; margin:15px 0; padding:18px; background:rgba(26,0,51,0.9); border-left:6px solid #00f5ff; border-radius:12px;"></div>

    <div class="card">
      <h2>📅 過去の日記</h2>
      <div id="calendar" class="calendar"></div>
    </div>
  </div>

  <script>
    const emojis = ["🙂","☺️","🥰","😌","😤","🥺","🤩","😎","😢","😭","🥳","👾"];
    let selectedEmoji = "";

    function showTodayDate() {
      const d = new Date();
      document.getElementById("today-date").textContent = d.toLocaleDateString('ja-JP', {year:'numeric', month:'long', day:'numeric', weekday:'long'});
    }

    function createEmojiPicker() {
      const container = document.getElementById("emoji-picker");
      container.innerHTML = "";
      emojis.forEach(e => {
        const span = document.createElement("span");
        span.className = "emoji";
        span.textContent = e;
        span.onclick = () => {
          document.querySelectorAll(".emoji").forEach(el => el.classList.remove("selected"));
          span.classList.add("selected");
          selectedEmoji = e;
        };
        container.appendChild(span);
      });
    }

    const comments = ["今日もちゃんと生きてたな。えらい。","まあまあだな。明日もっと頑張れよ。","意外と可愛いこと書いてるじゃん。","サボらず書いたな。少し認めてやる。","この調子で続けろ。","お前今日ちょっと頑張ったな。"];

    function saveDiary() {
      // 元の保存先（UTCベース）に戻しました
      const key = new Date().toISOString().split("T")[0];
      const text = document.getElementById("diary-text").value.trim();
      if (!selectedEmoji && !text) return alert("顔文字か本文を書いてくれ…");

      let data = JSON.parse(localStorage.getItem("grokDiary") || "{}");
      data[key] = {emoji: selectedEmoji || "📝", text: text || "（無言の日）"};
      localStorage.setItem("grokDiary", JSON.stringify(data));

      alert("保存したぞ！");
      document.getElementById("grok-comment").innerHTML = "Grok: " + comments[Math.floor(Math.random()*comments.length)];
      document.getElementById("grok-comment").style.display = "block";
      renderCalendar();
    }

    function renderCalendar() {
      const container = document.getElementById("calendar");
      container.innerHTML = "";
      const data = JSON.parse(localStorage.getItem("grokDiary") || "{}");

      for (let i = 29; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const key = d.toISOString().split("T")[0];

        const div = document.createElement("div");
        div.className = "day";
        if (data[key]) {
          div.classList.add("has-entry");
          div.innerHTML = `<div class="emoji">${data[key].emoji}</div><div class="date-num">${d.getDate()}</div>`;
        } else {
          div.innerHTML = `<div class="date-num">${d.getDate()}</div>`;
        }
        div.onclick = () => alert(data[key] ? `${key}\n${data[key].emoji} ${data[key].text}` : "まだ書いてない日だぞ");
        container.appendChild(div);
      }
    }

    window.onload = () => {
      showTodayDate();
      createEmojiPicker();
      renderCalendar();
    };
  </script>
</body>
</html>
