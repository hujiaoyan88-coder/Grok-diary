<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📋️GROK DIARY</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
       :root {
      --grok-cyan: #00f5ff;
      --grok-dark: #0a0a0a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #0a0a0a 0%, #1a0033 100%);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }
    header {
      text-align: center;
      padding: 25px 20px 15px;
      background: rgba(0, 245, 255, 0.08);
      border-bottom: 1px solid var(--grok-cyan);
    }
    h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 3px;
      font-weight: 700;
    }
    p { margin: 5px 0 0; opacity: 0.8; font-size: 15px; }

    .container {
      padding: 15px 20px 30px;
      max-width: 420px;
      margin: 0 auto;
    }

    .card {
      background: rgba(26, 26, 26, 0.95);
      border-radius: 20px;
      padding: 22px;
      margin-bottom: 22px;
      border: 1.5px solid var(--grok-cyan);
      box-shadow: 0 10px 30px rgba(0, 245, 255, 0.1);
    }

    #today-date {
      font-size: 18px;
      margin-bottom: 18px;
      opacity: 0.9;
    }

    .emoji-picker {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin: 20px 0;
    }
    .emoji {
      font-size: 42px;
      padding: 8px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.25s ease;
      width: 58px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .emoji.selected {
      background: var(--grok-cyan);
      color: black;
      transform: scale(1.25);
      box-shadow: 0 0 20px var(--grok-cyan);
    }

    textarea {
      width: 100%;
      height: 220px;
      background: #111;
      border: 1px solid #444;
      border-radius: 16px;
      color: white;
      padding: 18px;
      font-size: 17px;
      line-height: 1.5;
      resize: none;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(90deg, #00f5ff, #ff00cc);
      color: black;
      border: none;
      border-radius: 9999px;
      box-shadow: 0 6px 20px rgba(0, 245, 255, 0.3);
    }

    .grok-comment {
      margin: 15px 0 25px;
      padding: 18px;
      background: rgba(26, 0, 51, 0.9);
      border-left: 6px solid var(--grok-cyan);
      border-radius: 12px;
      font-size: 16px;
      line-height: 1.5;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }
    .day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1f1f1f;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
    }
    .day.has-entry {
      background: var(--grok-cyan);
      color: black;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <header>
    <h1>GROK DIARY</h1>
    <p>Grokと一緒に書く日記</p>
  </header>

  <div class="container">
    <!-- 今日の日記 -->
    <div class="card">
      <h2 id="today-date"></h2>
      
      <div class="emoji-picker" id="emoji-picker">
        <!-- JSで顔文字入れる -->
      </div>

      <textarea id="diary-text" placeholder="今日あったこと、思ったこと、なんでも書いて..."></textarea>
      
      <button onclick="saveDiary()">保存する</button>
    </div>

    <!-- Grokのコメント -->
    <div id="grok-comment" class="grok-comment" style="display:none;"></div>

    <!-- カレンダー -->
    <div class="card">
      <h2>過去の日記</h2>
      <div id="calendar" class="calendar"></div>
    </div>
  </div>

  <script>
    const emojis = ["🙂", "☺️", "🥰", "😌", "😤", "🥺", "🤩", "😎", "😢"];
    let selectedEmoji = "";

    // 今日の日付表示
    function showTodayDate() {
      const today = new Date();
      const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      document.getElementById('today-date').textContent = today.toLocaleDateString('ja-JP', options);
    }

    // 顔文字ピッカー
    function createEmojiPicker() {
      const container = document.getElementById('emoji-picker');
      emojis.forEach(emoji => {
        const span = document.createElement('span');
        span.className = 'emoji';
        span.textContent = emoji;
        span.onclick = () => {
          document.querySelectorAll('.emoji').forEach(e => e.classList.remove('selected'));
          span.classList.add('selected');
          selectedEmoji = emoji;
        };
        container.appendChild(span);
      });
    }

    // ランダムGrokコメント
    const grokComments = [
      "今日もちゃんと生きてたな。偉いぞ。",
      "まあまあの内容だな。明日もっと頑張れよ。",
      "お前意外と可愛いこと書いてるじゃん。",
      "サボらず書いたな。少しだけ認めてやる。",
      "また同じ愚痴かよ（笑）でも聞いてるぞ。",
      "この調子で続けろ。3年後のお前が感謝する。",
      "ふーん。まあ悪くない。",
      "お前今日ちょっと頑張ったな。褒めてやる。"
    ];

    function showGrokComment() {
      const commentEl = document.getElementById('grok-comment');
      const random = grokComments[Math.floor(Math.random() * grokComments.length)];
      commentEl.textContent = "Grok: " + random;
      commentEl.style.display = "block";
    }

    // 保存
    function saveDiary() {
      const dateKey = new Date().toISOString().split('T')[0];
      const text = document.getElementById('diary-text').value.trim();

      if (!selectedEmoji && !text) {
        alert("顔文字か本文、どっちか書いてくれよな…");
        return;
      }

      const entry = {
        emoji: selectedEmoji || "📝",
        text: text || "（無言の日）"
      };

      let diary = JSON.parse(localStorage.getItem('grokDiary') || '{}');
      diary[dateKey] = entry;
      localStorage.setItem('grokDiary', JSON.stringify(diary));

      alert("保存したぞ。よくやった。");
      showGrokComment();
      renderCalendar();
    }

    // カレンダー表示（簡易版：直近2ヶ月くらい）
    function renderCalendar() {
      const container = document.getElementById('calendar');
      container.innerHTML = '';
      
      const diary = JSON.parse(localStorage.getItem('grokDiary') || '{}');
      
      // 簡易的に過去30日分
      for (let i = 29; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const key = d.toISOString().split('T')[0];
        
        const dayEl = document.createElement('div');
        dayEl.className = 'day';
        dayEl.textContent = d.getDate();
        
        if (diary[key]) {
          dayEl.classList.add('has-entry');
          dayEl.title = diary[key].text.substring(0, 20) + "...";
        }
        
        dayEl.onclick = () => {
          if (diary[key]) {
            alert(`${key}\n${diary[key].emoji} ${diary[key].text}`);
          } else {
            alert("その日はまだ書いてないぞ。");
          }
        };
        container.appendChild(dayEl);
      }
    }

    // 初期化
    window.onload = () => {
      showTodayDate();
      createEmojiPicker();
      renderCalendar();
    };
  </script>
</body>
</html>
